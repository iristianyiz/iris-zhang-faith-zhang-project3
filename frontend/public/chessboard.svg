<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-label="Decorative chessboard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0.65"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dy="8" result="off"/>
      <feColorMatrix in="off" type="matrix"
        values="0 0 0 0 0.05  0 0 0 0 0.09  0 0 0 0 0.16  0 0 0 0.25 0" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="board" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="url(#light)"/>
      <rect x="0" y="0" width="30" height="30" fill="url(#dark)"/>
      <rect x="30" y="30" width="30" height="30" fill="url(#dark)"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="960" height="420" rx="26" fill="url(#bg)"/>
  <g filter="url(#softShadow)">
    <rect x="70" y="50" width="820" height="320" rx="22" fill="white" opacity="0.65"/>
    <rect x="92" y="72" width="776" height="276" rx="18" fill="url(#board)"/>
  </g>

  <g opacity="0.75">
    <circle cx="162" cy="132" r="10" fill="#eab308"/>
    <circle cx="798" cy="292" r="10" fill="#3b82f6"/>
  </g>
</svg>

